# VenueSuite → MEWS category mapping
#
# This file maps VenueSuite product component/category values to MEWS service
# and accounting category identifiers.
#
# Lookup order (most to least specific):
#   1. "component:category" compound key  (e.g. "extra:av")
#   2. "component" key alone              (e.g. "extra")
#   3. "fallback"                         (always used if nothing else matches)
#
# ── How to populate mews_service_id ────────────────────────────────────────
# Run the following against your MEWS instance to list available services:
#
#   curl -X POST https://api.mews-demo.com/api/connector/v1/services/getAll \
#     -H "Content-Type: application/json" \
#     -d '{
#           "ClientToken": "E0D439EE522F44368DC78E1BFB03710C-D24FB11DBE31D4621C4817E028D9E1D",
#           "AccessToken": "C66EF7B239D24632943D115EDE9CB810-EA00F8FD8294692C940F6B5A8F9453D",
#           "Client": "SynrfyRevenueSync/1.0"
#         }'
#
# Copy the relevant Id values into the fields below.
# mews_accounting_category_id is optional — leave null to use the service default.
# ────────────────────────────────────────────────────────────────────────────

mappings:
  # Room hire / meeting room space
  # → MEWS demo service: "ROOM CHARGE" (id: 3fd144f4-5c3d-45d8-bf77-b1b400a83d16)
  space:
    display_name: "Room Hire"
    mews_service_id: "3fd144f4-5c3d-45d8-bf77-b1b400a83d16"
    mews_accounting_category_id: null

  # Day-delegate / meeting packages (typically includes F&B)
  # → MEWS demo service: "breakfast - FnB" (id: 8f5a4dc5-7a46-4a78-a7b7-b1c0008cda7d)
  package:
    display_name: "Meeting Package / F&B"
    mews_service_id: "8f5a4dc5-7a46-4a78-a7b7-b1c0008cda7d"
    mews_accounting_category_id: null

  # Generic extras (default for anything not matched below)
  # → MEWS demo service: "Mice Service" (id: 13ac7699-a751-497e-8ab4-b35c007fa0c8)
  extra:
    display_name: "Extras / Miscellaneous"
    mews_service_id: "13ac7699-a751-497e-8ab4-b35c007fa0c8"
    mews_accounting_category_id: null

  # AV equipment — compound key wins over "extra" alone
  # → MEWS demo service: "Mice Service" (id: 13ac7699-a751-497e-8ab4-b35c007fa0c8)
  "extra:av":
    display_name: "AV Equipment"
    mews_service_id: "13ac7699-a751-497e-8ab4-b35c007fa0c8"
    mews_accounting_category_id: null

  # Food & Beverage charged as a standalone extra
  # → MEWS demo service: "breakfast - FnB" (id: 8f5a4dc5-7a46-4a78-a7b7-b1c0008cda7d)
  "extra:f&b":
    display_name: "Food & Beverage"
    mews_service_id: "8f5a4dc5-7a46-4a78-a7b7-b1c0008cda7d"
    mews_accounting_category_id: null

# Always present. Used when no mapping key matches.
# A WARNING is logged every time this is used — update the mappings above
# to resolve warnings.
# → MEWS demo service: "Mice Service" (id: 13ac7699-a751-497e-8ab4-b35c007fa0c8)
fallback:
  display_name: "General Revenue (unmapped fallback)"
  mews_service_id: "13ac7699-a751-497e-8ab4-b35c007fa0c8"
  mews_accounting_category_id: null
